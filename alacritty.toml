import = [
  "~/.config/alacritty/themes/themes/wombat.toml",
]

# 余白設定
[window]
padding = { x = 8, y = 6 }
dimensions = { columns = 140, lines = 40 }

[font]
size = 16
normal = { family = "Mononoki Nerd Font" }

[shell]
program = "/bin/zsh"
args = [
  "-l",
  "-c",
  "tmux a -t default || tmux new -s default; source ~/.config/tmux/default.session.conf",
]
